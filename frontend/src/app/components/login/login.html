<div class="auth-container">
  <form class="auth-form" (submit)="onLogin($event)">
    <h2>Login</h2>
    <p style="text-align: center; color: #666; margin-bottom: 1.5rem;">Welcome back! Log in to your account.</p>

    @if (errorMessage()) {
      <div style="background-color: #fee2e2; color: #b91c1c; padding: 0.75rem; border-radius: 0.375rem; margin-bottom: 1rem; text-align: center; font-size: 0.875rem;">
        {{ errorMessage() }}
      </div>
    }

    <label for="username">Username</label>
    <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="Username" required />

    <label for="password">Password</label>
    <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Password" required />

    <button type="submit" class="primary">Login</button>

    <p style="text-align: center; margin-top: 1rem;">Don't have an account yet? <a routerLink="/register">Register here</a></p>
  </form>
</div>
