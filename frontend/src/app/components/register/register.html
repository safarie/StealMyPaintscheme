<div class="auth-container">
  <form class="auth-form" (submit)="onRegister($event)">
    <h2>Registreren</h2>
    <p style="text-align: center; color: #666; margin-bottom: 1.5rem;">Maak een account aan om je verfschema's op te slaan.</p>

    @if (errorMessage()) {
      <div style="background-color: #fee2e2; color: #b91c1c; padding: 0.75rem; border-radius: 0.375rem; margin-bottom: 1rem; text-align: center; font-size: 0.875rem;">
        {{ errorMessage() }}
      </div>
    }

    <label for="reg-username">Gebruikersnaam</label>
    <input type="text" id="reg-username" name="username" [(ngModel)]="username" placeholder="Gebruikersnaam" required />

    <label for="reg-email">E-mail</label>
    <input type="email" id="reg-email" name="email" [(ngModel)]="email" placeholder="E-mail" required />

    <label for="reg-password">Wachtwoord</label>
    <input type="password" id="reg-password" name="password" [(ngModel)]="password" placeholder="Wachtwoord" required />

    <label for="reg-confirm">Bevestig Wachtwoord</label>
    <input type="password" id="reg-confirm" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Bevestig Wachtwoord" required />

    <button type="submit" class="primary">Registreren</button>

    <p style="text-align: center; margin-top: 1rem;">Heb je al een account? <a routerLink="/login">Log hier in</a></p>
  </form>
</div>
