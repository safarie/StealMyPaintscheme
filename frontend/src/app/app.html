<header>
  <a routerLink="/" class="logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
    <h1>{{ title() }}</h1>
  </a>
  <nav>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/paint-schemes" routerLinkActive="active">Paint Schemes</a>
    <a routerLink="/inventory" routerLinkActive="active">Inventory</a>
    <a routerLink="/login" routerLinkActive="active">Login</a>
    <a routerLink="/register" routerLinkActive="active">Register</a>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>

  <hr />

  @if (responseMessage()) {
    <div class="message-box">
      <strong>Response:</strong> {{ responseMessage() }}
    </div>
  }
</main>
