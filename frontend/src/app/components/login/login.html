<div class="auth-container">
  <form class="auth-form" (submit)="onLogin($event)">
    <h2>Inloggen</h2>
    <p style="text-align: center; color: #666; margin-bottom: 1.5rem;">Welkom terug! Log in op je account.</p>

    @if (errorMessage()) {
      <div style="background-color: #fee2e2; color: #b91c1c; padding: 0.75rem; border-radius: 0.375rem; margin-bottom: 1rem; text-align: center; font-size: 0.875rem;">
        {{ errorMessage() }}
      </div>
    }

    <label for="username">Gebruikersnaam</label>
    <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="Gebruikersnaam" required />

    <label for="password">Wachtwoord</label>
    <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Wachtwoord" required />

    <button type="submit" class="primary">Inloggen</button>

    <p style="text-align: center; margin-top: 1rem;">Nog geen account? <a routerLink="/register">Registreer hier</a></p>
  </form>
</div>
