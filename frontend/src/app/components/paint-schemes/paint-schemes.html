<div class="schemes-container">
  <div class="section-banner">
    <h2>All Paint Schemes</h2>
  </div>

  <div class="scheme-list">
    @for (scheme of paintSchemes(); track scheme.id) {
      <div class="scheme-card" [class.own-scheme]="scheme.userId === currentUserId()">
        <div class="scheme-header">
          <h3>{{ scheme.name }}</h3>
          @if (scheme.userId === currentUserId()) {
            <span class="badge">Yours</span>
          }
        </div>
        <p>{{ scheme.description }}</p>
        <button class="secondary">View details</button>
      </div>
    } @empty {
      <p>No paint schemes found.</p>
    }
  </div>
</div>
